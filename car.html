<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Car</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>BekdanAuto</h1>
</header>

<div class="car">

  <img id="img" class="big">

  <h2 id="name"></h2>
  <p id="price"></p>

  <button onclick="history.back()">BACK</button>

</div>

<script src="cars.js"></script>
<script src="script.js"></script>

<script>
const id=new URLSearchParams(location.search).get("id");
const car=cars.find(c=>c.id===id);

document.getElementById("img").src=car.img;
document.getElementById("name").innerText=car.name;
document.getElementById("price").innerText=car.price;
</script>

</body>
</html>
