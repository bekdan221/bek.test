<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mega Quiz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  🧠 MEGA QUIZ CHALLENGE
</header>

<div class="container">

  <!-- PROGRESS BAR -->
  <div class="progress">
    <div id="progress-bar"></div>
  </div>

  <!-- CATEGORY -->
  <div class="category">
    <button onclick="startQuiz(0)">IQ тест</button>
    <button onclick="startQuiz(1)">IT тест</button>
    <button onclick="startQuiz(2)">Машины</button>
    <button onclick="startQuiz(3)">Игры</button>
    <button onclick="startQuiz(4)">Бизнес</button>
    <button onclick="startQuiz(5)">Общее 1</button>
    <button onclick="startQuiz(6)">Общее 2</button>
  </div>

  <!-- QUIZ BOX -->
  <div class="quiz-box">

    <h2 id="question">Выбери тест</h2>

    <div id="answers"></div>

    <button onclick="next()">Дальше</button>

    <p id="score"></p>

  </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
