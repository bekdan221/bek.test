<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Auto-Tech Arena 2026</title>
    <style>
        :root { --primary: #00f2fe; --bg: #0a0a0c; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #app { width: 100%; max-width: 600px; padding: 20px; text-align: center; }
        .stats-bar { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; color: var(--primary); }
        button { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 15px 25px; margin: 10px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background: var(--primary); color: black; }
        .car-visual { font-size: 50px; margin: 20px 0; transition: transform 0.1s; }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // 1. БАЗА ДАННЫХ ИГРОКА
    const Game = {
        money: 100,
        engineLevel: 1,
        
        // 2. ДВИЖОК ЭКРАНОВ
        show(screen) {
            const app = document.getElementById('app');
            if(screen === 'garage') {
                app.innerHTML = `
                    <div class="stats-bar"><span>Деньги: ${this.money}$</span><span>Двигатель: lvl ${this.engineLevel}</span></div>
                    <h1>ГАРАЖ</h1>
                    <div class="car-visual">🏎️</div>
                    <button onclick="Game.upgrade()">Улучшить двигатель (50$)</button>
                    <button onclick="Game.show('track')">На трассу</button>
                `;
            } else if(screen === 'track') {
                app.innerHTML = `
                    <h1>ТРАССА</h1>
                    <div id="car" class="car-visual">🏎️</div>
                    <button onclick="Game.drive()">ГАЗ В ПОЛ!</button>
                    <button onclick="Game.show('garage')">Назад в гараж</button>
                `;
            }
        },

        // 3. ЛОГИКА ИГРЫ
        upgrade() {
            if(this.money >= 50) {
                this.money -= 50;
                this.engineLevel++;
                this.show('garage');
            } else { alert("Недостаточно средств!"); }
        },

        drive() {
            const car = document.getElementById('car');
            const speed = this.engineLevel * 20;
            car.style.transform = `translateX(${speed}px)`;
            alert(`Машина проехала ${speed} метров!`);
        }
    };

    // Запуск проекта
    Game.show('garage');
</script>
</body>
</html>
