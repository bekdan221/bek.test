<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мега-Тест: IT и IQ</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 600px; box-shadow: 0 0 15px rgba(0,0,0,0.5); text-align: center; }
        button { background: #ff3333; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; transition: 0.3s; }
        button:hover { background: #cc0000; }
        .cat { color: #888; text-transform: uppercase; font-size: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <div id="category" class="cat">Категория</div>
    <h2 id="question">Вопрос</h2>
    <div id="options"></div>
</div>

<script>
    const quiz = [
        // IQ Тесты
        { cat: "IQ Тест", q: "Сколько будет 2 + 2 * 2?", a: ["6", "8", "4", "10"], correct: 0 },
        { cat: "IQ Тест", q: "Найди лишнее: Яблоко, Груша, Морковь, Банан", a: ["Морковь", "Яблоко", "Груша", "Банан", "Киви"], correct: 0 },
        { cat: "IQ Тест", q: "У отца Мэри есть 5 дочерей: Чача, Чече, Чичи, Чочо. Как зовут пятую?", a: ["Чучу", "Мэри", "Аня", "Лена"], correct: 1 },
        
        // IT Тесты
        { cat: "IT Тест", q: "Что такое HTML?", a: ["Язык программирования", "Язык разметки", "Браузер", "Антивирус"], correct: 1 },
        { cat: "IT Тест", q: "Какой язык используется для создания Telegram-ботов?", a: ["Python", "HTML", "CSS", "Photoshop", "Excel"], correct: 0 },
        { cat: "IT Тест", q: "Где хранят код программисты?", a: ["В сейфе", "GitHub", "На флешке", "В голове", "В облаке"], correct: 1 }
    ];

    let current = 0;
    function load() {
        if(current >= quiz.length) {
            document.querySelector('.box').innerHTML = "<h2>Тест пройден! Ты справился!</h2><button onclick='location.reload()'>Начать заново</button>";
            return;
        }
        document.getElementById('category').innerText = quiz[current].cat;
        document.getElementById('question').innerText = quiz[current].q;
        const opt = document.getElementById('options');
        opt.innerHTML = "";
        quiz[current].a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = () => { current++; load(); };
            opt.appendChild(btn);
        });
    }
    load();
</script>

</body>
</html>
