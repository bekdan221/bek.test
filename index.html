<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Auth App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- ТАБЫ -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('signup')">Sign Up</button>
    <button class="tab" onclick="showTab('signin')">Sign In</button>
  </div>

  <!-- SIGN UP -->
  <div id="signup" class="form active">
    <h2>Sign Up</h2>

    <input id="su_user" placeholder="Nickname">
    <input id="su_pass" type="password" placeholder="Password (8 digits)">

    <button onclick="register()">Create Account</button>
  </div>

  <!-- SIGN IN -->
  <div id="signin" class="form">
    <h2>Sign In</h2>

    <input id="si_user" placeholder="Nickname">
    <input id="si_pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

  <p id="msg"></p>

</div>

<!-- МЕНЮ (после входа) -->
<div id="menu" class="menu hidden">
  <h1>🎉 Welcome to your project!</h1>
  <p>Ты вошёл в систему</p>
</div>

<script src="app.js"></script>
</body>
</html>
