<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мини-Бильярд</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; flex-direction: column; }
        canvas { background: #060; border: 15px solid #5d4037; border-radius: 5px; cursor: crosshair; }
    </style>
</head>
<body>
    <h2>Нажми и тяни, чтобы ударить по белому шару</h2>
    <canvas id="poolTable" width="800" height="400"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Events } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body.querySelector('canvas'),
            engine: engine,
            options: { width: 800, height: 400, wireframes: false, background: '#060' }
        });

        // Создаем борта
        const wallOptions = { isStatic: true, render: { fillStyle: '#5d4037' } };
        const walls = [
            Bodies.rectangle(400, 0, 800, 30, wallOptions),
            Bodies.rectangle(400, 400, 800, 30, wallOptions),
            Bodies.rectangle(0, 200, 30, 400, wallOptions),
            Bodies.rectangle(800, 200, 30, 400, wallOptions)
        ];

        // Создаем шары
        const whiteBall = Bodies.circle(200, 200, 15, { restitution: 0.9, friction: 0.1, render: { fillStyle: '#fff' } });
        const redBall = Bodies.circle(600, 200, 15, { restitution: 0.9, friction: 0.1, render: { fillStyle: '#f00' } });

        Composite.add(engine.world, [...walls, whiteBall, redBall]);

        // Управление ударом
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse });
        Composite.add(engine.world, mouseConstraint);

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
