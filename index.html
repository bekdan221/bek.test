<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бильярд PRO</title>
    <style>
        body { margin: 0; background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { background: #080; border: 20px solid #5d4037; border-radius: 10px; cursor: crosshair; }
    </style>
</head>
<body>
    <h3>Бильярд: Прицелься мышкой и отпусти для удара</h3>
    <canvas id="game"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Events, Mouse, MouseConstraint } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body.querySelector('#game'),
            engine: engine,
            options: { width: 800, height: 400, wireframes: false, background: '#080' }
        });

        // Борта и лузы
        const walls = [
            Bodies.rectangle(400, -10, 800, 20, { isStatic: true }),
            Bodies.rectangle(400, 410, 800, 20, { isStatic: true }),
            Bodies.rectangle(-10, 200, 20, 400, { isStatic: true }),
            Bodies.rectangle(810, 200, 20, 400, { isStatic: true })
        ];

        // Лузы (сенсоры)
        const pockets = [
            Bodies.circle(0, 0, 30, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } }),
            Bodies.circle(800, 0, 30, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } }),
            Bodies.circle(0, 400, 30, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } }),
            Bodies.circle(800, 400, 30, { isStatic: true, isSensor: true, render: { fillStyle: '#000' } })
        ];

        // Шары
        const whiteBall = Bodies.circle(200, 200, 15, { restitution: 0.8, friction: 0.05, render: { fillStyle: '#fff' } });
        const targetBall = Bodies.circle(600, 200, 15, { restitution: 0.8, friction: 0.05, render: { fillStyle: '#f00' } });

        Composite.add(engine.world, [...walls, ...pockets, whiteBall, targetBall]);

        // Логика луз
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach(pair => {
                if (pair.bodyA.isSensor || pair.bodyB.isSensor) {
                    const ball = pair.bodyA.isSensor ? pair.bodyB : pair.bodyA;
                    if (ball !== whiteBall) {
                        Composite.remove(engine.world, ball);
                        alert("ГОЛ!");
                    }
                }
            });
        });

        // Удар кием (упрощенно: клик по белому шару дает импульс)
        document.querySelector('#game').addEventListener('mousedown', (e) => {
            const rect = render.canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const force = { x: (whiteBall.position.x - mouseX) * 0.005, y: (whiteBall.position.y - mouseY) * 0.005 };
            Body.applyForce(whiteBall, whiteBall.position, force);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
