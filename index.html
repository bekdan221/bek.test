<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AutoForge 2026</title>
    <style>
        :root { --car-color: #ff3e3e; }
        body { margin: 0; background: #0f0f12; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 800px; width: 90%; margin-top: 50px; }
        
        /* Визуализация машины */
        .car-display { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 100px; background: #1a1a20; border-radius: 20px; margin-bottom: 30px; transition: 0.5s; }
        .car-body { color: var(--car-color); filter: drop-shadow(0 0 20px var(--car-color)); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #1a1a20; padding: 20px; border-radius: 15px; }
        button { background: #333; color: white; border: none; padding: 10px; margin: 5px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--car-color); }
        .stats { margin-top: 20px; font-family: monospace; color: #00f2fe; }
    </style>
</head>
<body>

<div class="container">
    <h1>AutoForge 2026</h1>
    <div class="car-display"><div class="car-body" id="car">🚗</div></div>
    
    <div class="controls">
        <div class="panel">
            <h3>Цвет кузова</h3>
            <button onclick="setCarColor('#ff3e3e')">Красный</button>
            <button onclick="setCarColor('#00f2fe')">Неон</button>
            <button onclick="setCarColor('#70ff70')">Кислотный</button>
        </div>
        <div class="panel">
            <h3>Двигатель</h3>
            <button onclick="setEngine('V8', 450)">V8 (450 л.с.)</button>
            <button onclick="setEngine('Electric', 600)">Electric (600 л.с.)</button>
        </div>
    </div>
    
    <div class="stats" id="stats">
        Выберите параметры для начала сборки...
    </div>
</div>

<script>
    let config = { color: '#ff3e3e', engine: 'None', hp: 0 };
    
    function setCarColor(color) {
        config.color = color;
        document.documentElement.style.setProperty('--car-color', color);
        updateStats();
    }
    
    function setEngine(type, hp) {
        config.engine = type;
        config.hp = hp;
        updateStats();
    }
    
    function updateStats() {
        document.getElementById('stats').innerHTML = `
            СБОРКА: ${config.engine} <br>
            МОЩНОСТЬ: ${config.hp} л.с. <br>
            ЦВЕТ: ${config.color} <br>
            STATUS: Ready for track!
        `;
    }
</script>
</body>
</html>
